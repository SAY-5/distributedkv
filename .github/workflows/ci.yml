name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -timeout 90s -short ./...
      - run: go test -timeout 180s ./internal/raftnode/...

  docker:
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: distributedkv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
